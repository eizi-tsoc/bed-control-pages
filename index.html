<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>病床稼働率レポート生成</title>
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); padding: 40px; width: 100%; max-width: 540px; }
  h1 { color: #2c5f8a; font-size: 22px; margin-bottom: 6px; }
  .subtitle { color: #888; font-size: 13px; margin-bottom: 30px; }
  .section { margin-bottom: 24px; }
  label { display: block; font-size: 13px; font-weight: bold; color: #444; margin-bottom: 8px; }
  .upload-area { border: 2px dashed #b0c8e0; border-radius: 8px; padding: 30px; text-align: center; cursor: pointer; transition: all 0.2s; background: #f8fbff; }
  .upload-area:hover { border-color: #2c5f8a; background: #eef4fb; }
  .upload-area.dragover { border-color: #2c5f8a; background: #ddeeff; }
  .upload-icon { font-size: 36px; margin-bottom: 10px; }
  .upload-text { color: #666; font-size: 14px; }
  .upload-text span { color: #2c5f8a; font-weight: bold; }
  .file-name { margin-top: 10px; font-size: 13px; color: #2c5f8a; font-weight: bold; }
  select { width: 100%; padding: 10px 14px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; color: #333; background: white; }
  .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; margin-bottom: 10px; }
  .btn-primary { background: #2c5f8a; color: white; }
  .btn-primary:hover { background: #1e4a6e; }
  .btn-primary:disabled { background: #aaa; cursor: not-allowed; }
  .btn-download { background: #1e7e34; color: white; display: none; }
  .btn-download:hover { background: #155724; }
  .status { margin-top: 16px; padding: 14px; border-radius: 8px; font-size: 14px; display: none; }
  .status.info    { background: #e8f0fe; color: #2c5f8a; display: block; }
  .status.success { background: #e6f4ea; color: #1e7e34; display: block; }
  .status.error   { background: #fde8e8; color: #c0392b; display: block; }
  .progress { margin-top: 12px; background: #e0e0e0; border-radius: 4px; height: 8px; display: none; }
  .progress-bar { height: 8px; border-radius: 4px; background: #2c5f8a; width: 0%; transition: width 0.3s; }
  .legend { display: flex; gap: 12px; font-size: 12px; margin-top: 8px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .dot { width: 12px; height: 12px; border-radius: 2px; }
  .init-msg { text-align: center; color: #888; font-size: 13px; margin-top: 8px; }
</style>
</head>
<body>
<div class="card">
  <h1>🏥 病床稼働率レポート生成</h1>
  <p class="subtitle">Excelファイルをアップロードして稼働率レポートを生成します</p>

  <div class="section">
    <label>① Excelファイルを選択</label>
    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
      <div class="upload-icon">📂</div>
      <div class="upload-text"><span>クリック</span>またはファイルをドラッグ＆ドロップ</div>
      <div class="file-name" id="fileName">ファイルが選択されていません</div>
    </div>
    <input type="file" id="fileInput" accept=".xlsx" style="display:none">
  </div>

  <div class="section">
    <label>② 処理する年を選択</label>
    <select id="yearSelect">
      <option value="auto">自動検出（最も多い年）</option>
      <option value="2025">2025年</option>
      <option value="2026">2026年</option>
      <option value="2027">2027年</option>
      <option value="2028">2028年</option>
    </select>
  </div>

  <div class="section">
    <label>③ 色の凡例</label>
    <div class="legend">
      <div class="legend-item"><div class="dot" style="background:#FF99CC"></div>女性（F）</div>
      <div class="legend-item"><div class="dot" style="background:#9DC3E6"></div>男性（M）</div>
      <div class="legend-item"><div class="dot" style="background:#ED7D31"></div>入退院同日（O）</div>
    </div>
  </div>

  <button class="btn btn-primary" id="generateBtn" onclick="generateReport()" disabled>レポートを生成する</button>
  <button class="btn btn-download" id="downloadBtn" onclick="downloadReport()">📥 レポートをダウンロード</button>

  <div class="progress" id="progressBar">
    <div class="progress-bar" id="progressFill"></div>
  </div>
  <div class="status" id="status"></div>
  <div class="init-msg" id="initMsg">⏳ Python環境を初期化中です（初回のみ20秒ほどかかります）</div>
</div>

<script>
let pyodide = null;
let fileBytes = null;
let reportBytes = null;

function setStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  el.textContent = msg;
}

function setProgress(pct) {
  const bar = document.getElementById('progressBar');
  const fill = document.getElementById('progressFill');
  bar.style.display = 'block';
  fill.style.width = pct + '%';
  if (pct >= 100) setTimeout(() => { bar.style.display = 'none'; }, 500);
}

// Pyodide初期化
async function initPyodide() {
  try {
    setProgress(20);
    pyodide = await loadPyodide();
    setProgress(60);
    await pyodide.loadPackage('micropip');
    const micropip = pyodide.pyimport('micropip');
    await micropip.install('openpyxl');
    setProgress(100);
    document.getElementById('initMsg').textContent = '✅ Python環境の準備完了';
    document.getElementById('initMsg').style.color = '#1e7e34';
    if (fileBytes) document.getElementById('generateBtn').disabled = false;
  } catch(e) {
    setStatus('error', 'Python環境の初期化に失敗しました: ' + e.message);
  }
}

// ファイル選択
document.getElementById('fileInput').addEventListener('change', e => loadFile(e.target.files[0]));
const area = document.getElementById('uploadArea');
area.addEventListener('dragover', e => { e.preventDefault(); area.classList.add('dragover'); });
area.addEventListener('dragleave', () => area.classList.remove('dragover'));
area.addEventListener('drop', e => { e.preventDefault(); area.classList.remove('dragover'); loadFile(e.dataTransfer.files[0]); });

async function updateYearOptions(bytes) {
  if (!pyodide) return;
  try {
    pyodide.globals.set('probe_bytes', bytes);
    const years = await pyodide.runPythonAsync(`
import io, openpyxl
from datetime import datetime
from collections import Counter
wb = openpyxl.load_workbook(io.BytesIO(bytes(probe_bytes)))
all_years = {}
for sname in wb.sheetnames:
    if '病床' not in sname: continue
    ws_tmp = wb[sname]
    for col in range(2, ws_tmp.max_column + 1):
        cell = ws_tmp.cell(row=1, column=col)
        if cell.value and isinstance(cell.value, datetime):
            y = cell.value.year
            all_years[y] = all_years.get(y, 0) + 1
','.join(str(y) for y in sorted(all_years.keys(), reverse=True) if all_years[y] > 10)
`);
    const sel = document.getElementById('yearSelect');
    sel.innerHTML = '<option value="auto">自動検出（最も多い年）</option>';
    years.split(',').filter(y=>y).forEach(y => {
      const opt = document.createElement('option');
      opt.value = y; opt.textContent = y + '年';
      sel.appendChild(opt);
    });
  } catch(e) { console.log('year detect error', e); }
}

function loadFile(file) {
  if (!file) return;
  document.getElementById('fileName').textContent = file.name;
  const reader = new FileReader();
  reader.onload = e => {
    fileBytes = new Uint8Array(e.target.result);
    if (pyodide) document.getElementById('generateBtn').disabled = false;
    setStatus('info', 'ファイル読み込み完了。「レポートを生成する」をクリックしてください。');
  };
  reader.readAsArrayBuffer(file);
}

async function generateReport() {
  if (!pyodide || !fileBytes) return;
  document.getElementById('generateBtn').disabled = true;
  document.getElementById('downloadBtn').style.display = 'none';
  setStatus("info", "処理中です。しばらくお待ちください..."););
  setProgress(10);

  try {
    pyodide.globals.set('file_bytes', fileBytes);
    pyodide.globals.set('selected_year', document.getElementById('yearSelect').value);

    setProgress(30);

    const result = await pyodide.runPythonAsync(`
import io, base64
from datetime import date
from collections import OrderedDict, Counter
import openpyxl
from openpyxl.styles import PatternFill, Font, Alignment, Border, Side
from openpyxl.utils import get_column_letter
from datetime import datetime

PINK   = 'FFFFCCFF'
BLUE   = 'FFDDEBF7'
ORANGE = 'FFED7D31'
TOTAL_BEDS = 19
WEEKDAYS = {0:'月',1:'火',2:'水',3:'木',4:'金',5:'土',6:'日'}

# ROOM_MAP は動的に検出（シートごとに行構成が異なるため）
ROOM_MAP = {}  # 後で動的に設定
ROOM_TYPE = {
    '301':'1人部屋個室','302':'1人部屋個室','303':'1人部屋個室',
    '304':'1人部屋個室','305':'1人部屋個室','306':'1人部屋個室','201':'1人部屋個室',
    '307-1':'307(5人部屋)','307-2':'307(5人部屋)','307-3':'307(5人部屋)',
    '307-4':'307(5人部屋)','307-5':'307(5人部屋)',
    '308-1':'308(4人部屋)','308-2':'308(4人部屋)',
    '308-3':'308(4人部屋)','308-4':'308(4人部屋)',
    '202-1':'202(3人部屋)','202-2':'202(3人部屋)','202-3':'202(3人部屋)',
}

def fill(color): return PatternFill('solid', fgColor=color)
def border():
    s = Side(style='thin')
    return Border(left=s, right=s, top=s, bottom=s)
def occ_fill(pct):
    if pct >= 90: return fill('FFFFC7CE')
    if pct >= 70: return fill('FFFFEB9C')
    return fill('FFC6EFCE')

HEADER_BG = 'FF4472C4'
SUBHDR_BG = 'FFD9E1F2'

# ファイル読み込み
wb_src = openpyxl.load_workbook(io.BytesIO(bytes(file_bytes)), data_only=True)
# 年の決定（先にシート一覧から判断）
if selected_year == 'auto':
    # 全病床シートを調べて最もデータが多い年を検出
    best_year = None
    best_count = 0
    for sname in wb_src.sheetnames:
        if '病床' not in sname: continue
        ws_tmp = wb_src[sname]
        tmp_dates = []
        for col in range(2, ws_tmp.max_column + 1):
            cell = ws_tmp.cell(row=1, column=col)
            if cell.value and isinstance(cell.value, datetime):
                tmp_dates.append(cell.value.date())
        yc = Counter(d.year for d in tmp_dates)
        if yc:
            top_year, top_count = yc.most_common(1)[0]
            if top_count > best_count:
                best_count = top_count
                best_year = top_year
    target_year = best_year
else:
    target_year = int(selected_year)

# 対象年に合うシートを選択（シート名に年が含まれていれば優先）
ws = None
for sname in wb_src.sheetnames:
    if '病床' in sname and str(target_year) in sname:
        ws = wb_src[sname]
        break
if ws is None:
    ws = next((wb_src[n] for n in wb_src.sheetnames if '病床' in n), None)

# 部屋行を動的検出
import re
ROOM_NORMALIZE = {
    '302':'302','303':'303','305':'305','301':'301','304':'304',
    '201':'201','306':'306',
    '307-1':'307-1','307-2':'307-2','307-3':'307-3','307-4':'307-4','307-5':'307-5',
    '308-1':'308-1','308-2':'308-2','308-3':'308-3','308-4':'308-4',
    '202-1':'202-1','202-2':'202-2','202-3':'202-3',
}
def detect_room_id(val):
    if not val: return None
    val = str(val).strip()
    for pattern, room_id in [
        (r'302','302'),(r'303','303'),(r'305','305'),(r'301','301'),(r'304','304'),
        (r'201','201'),(r'306','306'),
        (r'307.?3','307-3'),(r'307.?4','307-4'),(r'307.?1','307-1'),
        (r'307.?5','307-5'),(r'307.?2','307-2'),
        (r'308.?3','308-3'),(r'308.?1','308-1'),(r'308.?4','308-4'),(r'308.?2','308-2'),
        (r'202.?1','202-1'),(r'202.?3','202-3'),(r'202.?2','202-2'),
    ]:
        if re.search(pattern, val):
            return room_id
    return None

ROOM_MAP = {}
for row in ws.iter_rows(min_col=1, max_col=1):
    cell = row[0]
    if cell.value:
        room_id = detect_room_id(cell.value)
        if room_id:
            ROOM_MAP[cell.row] = room_id

print(f'検出された部屋数: {len(ROOM_MAP)}')

# 日付読み込み
dates_map = {}
for col in range(2, ws.max_column + 1):
    cell = ws.cell(row=1, column=col)
    if cell.value and isinstance(cell.value, datetime):
        dates_map[col] = cell.value.date()

target_dates = sorted([d for d in dates_map.values() if d.year == target_year])
if not target_dates:
    available = sorted(set(d.year for d in dates_map.values()))
    raise ValueError(f'{target_year}年のデータが見つかりません。このファイルに含まれる年: {available}')
col_by_date  = {v: k for k, v in dates_map.items() if v.year == target_year}
all_beds = list(ROOM_MAP.values())

# セル色読み込み（data_only=Trueではスタイル保持されないため再読み込み）
wb_style = openpyxl.load_workbook(io.BytesIO(bytes(file_bytes)))
ws_style = None
for sname in wb_style.sheetnames:
    if '病床' in sname and str(target_year) in sname:
        ws_style = wb_style[sname]
        break
if ws_style is None:
    ws_style = next((wb_style[n] for n in wb_style.sheetnames if '病床' in n), None)
# ROOM_MAPはすでにws（data_only）から検出済みなのでそのまま使用

bed_day_color = {}
for row_num, bed_id in ROOM_MAP.items():
    for dt in target_dates:
        col = col_by_date.get(dt)
        if col is None: continue
        fg = ws_style.cell(row=row_num, column=col).fill.fgColor.rgb
        if   fg == PINK:   bed_day_color[(bed_id, str(dt))] = 'female'
        elif fg == BLUE:   bed_day_color[(bed_id, str(dt))] = 'male'
        elif fg == ORANGE: bed_day_color[(bed_id, str(dt))] = 'orange'
        else:              bed_day_color[(bed_id, str(dt))] = None

def gc(bed_id, dt): return bed_day_color.get((bed_id, str(dt)))

# 日次集計
stats = {str(dt): {
    'dt': dt, 'total':0, 'male':0, 'female':0,
    'admissions':0, 'discharges':0,
    'admit_male':0, 'admit_female':0,
    'discharge_male':0, 'discharge_female':0,
} for dt in target_dates}

for bed_id in all_beds:
    for i, dt in enumerate(target_dates):
        cur  = gc(bed_id, dt)
        prev = gc(bed_id, target_dates[i-1]) if i > 0 else None
        nxt  = gc(bed_id, target_dates[i+1]) if i < len(target_dates)-1 else None
        s = stats[str(dt)]
        if cur in ('female','male','orange'): s['total'] += 1
        if cur == 'orange':
            s['admissions'] += 1; s['discharges'] += 1
            if prev == 'female': s['discharge_female'] += 1
            elif prev == 'male': s['discharge_male'] += 1
            if nxt == 'female':  s['admit_female'] += 1
            elif nxt == 'male':  s['admit_male'] += 1
        if cur in ('female','male') and prev not in ('female','male','orange'):
            s['admissions'] += 1
            if cur == 'female': s['admit_female'] += 1
            else: s['admit_male'] += 1
        if prev in ('female','male') and cur not in ('female','male','orange'):
            ps = stats[str(target_dates[i-1])]
            ps['discharges'] += 1
            if prev == 'female': ps['discharge_female'] += 1
            else: ps['discharge_male'] += 1

for i, dt in enumerate(target_dates):
    s = stats[str(dt)]
    s['male'] = s['female'] = 0
    for bed_id in all_beds:
        cur = gc(bed_id, dt)
        nxt = gc(bed_id, target_dates[i+1]) if i < len(target_dates)-1 else None
        if cur == 'female': s['female'] += 1
        elif cur == 'male': s['male'] += 1
        elif cur == 'orange':
            if nxt == 'female': s['female'] += 1
            elif nxt == 'male': s['male'] += 1

# 月別グループ
months = OrderedDict()
for dt in target_dates:
    key = (dt.year, dt.month)
    if key not in months: months[key] = []
    months[key].append(dt)

# 出力ワークブック
wb = openpyxl.Workbook()
wb.remove(wb.active)

def make_month_sheet(ws, year, month, day_list):
    ws.freeze_panes = 'C4'
    n = len(day_list)
    BED_START = 4
    BED_END   = BED_START + len(all_beds) - 1
    MALE_ROW  = BED_END + 2
    FEM_ROW   = MALE_ROW + 1
    ADM_ROW   = FEM_ROW + 1
    DIS_ROW   = ADM_ROW + 1
    OCC_ROW   = DIS_ROW + 1

    ws.merge_cells(start_row=1, start_column=1, end_row=1, end_column=2+n)
    t = ws.cell(row=1, column=1)
    t.value = f'{year}年{month}月 病床稼働状況'
    t.font  = Font(bold=True, size=14, color='FFFFFFFF')
    t.fill  = fill(HEADER_BG)
    t.alignment = Alignment(horizontal='center', vertical='center')
    ws.row_dimensions[1].height = 24

    for r in (2, 3):
        for c, v in [(1,'部屋番号'),(2,'タイプ')]:
            cell = ws.cell(row=r, column=c)
            cell.value = v; cell.font = Font(bold=True, size=9)
            cell.fill  = fill(SUBHDR_BG)
            cell.alignment = Alignment(horizontal='center', vertical='center')
            cell.border = border()

    for j, dt in enumerate(day_list):
        col = 3 + j
        dc = ws.cell(row=2, column=col)
        dc.value = dt.strftime('%m/%d'); dc.font = Font(bold=True, size=9)
        dc.fill  = fill(SUBHDR_BG); dc.alignment = Alignment(horizontal='center'); dc.border = border()
        wd = WEEKDAYS[dt.weekday()]
        wc = ws.cell(row=3, column=col)
        wc.value = wd; wc.font = Font(bold=True, size=9)
        wc.fill  = fill('FFBDD7EE') if wd=='土' else fill('FFFCE4D6') if wd=='日' else fill(SUBHDR_BG)
        wc.alignment = Alignment(horizontal='center'); wc.border = border()

    for bi, bed_id in enumerate(all_beds):
        row = BED_START + bi
        bc = ws.cell(row=row, column=1)
        bc.value = bed_id; bc.font = Font(bold=True, size=9)
        bc.fill  = fill(SUBHDR_BG); bc.alignment = Alignment(horizontal='center', vertical='center'); bc.border = border()
        tc = ws.cell(row=row, column=2)
        tc.value = ROOM_TYPE.get(bed_id,''); tc.font = Font(size=9)
        tc.fill  = fill(SUBHDR_BG); tc.alignment = Alignment(horizontal='center', vertical='center'); tc.border = border()
        for j, dt in enumerate(day_list):
            col = 3 + j
            cur  = gc(bed_id, dt)
            cell = ws.cell(row=row, column=col)
            if   cur == 'female': cell.fill = fill('FFFF99CC'); cell.value = 'F'
            elif cur == 'male':   cell.fill = fill('FF9DC3E6'); cell.value = 'M'
            elif cur == 'orange': cell.fill = fill('FFED7D31'); cell.value = 'O'
            else:                 cell.fill = fill('FFFFFFFF')
            cell.font = Font(size=8, bold=(cur is not None))
            cell.alignment = Alignment(horizontal='center', vertical='center'); cell.border = border()
        ws.row_dimensions[row].height = 14

    for row, label, key, bg in [
        (MALE_ROW,'当日の男性患者数','male','FFD6E4F7'),
        (FEM_ROW, '当日の女性患者数','female','FFFFE0EF'),
        (ADM_ROW, '当日の入院実数','admissions','FFE2EFDA'),
        (DIS_ROW, '当日の退院実数','discharges','FFFFE699'),
    ]:
        ws.merge_cells(start_row=row, start_column=1, end_row=row, end_column=2)
        lc = ws.cell(row=row, column=1)
        lc.value = label; lc.font = Font(bold=True, size=9)
        lc.fill  = fill(SUBHDR_BG); lc.alignment = Alignment(horizontal='center', vertical='center'); lc.border = border()
        for j, dt in enumerate(day_list):
            cell = ws.cell(row=row, column=3+j)
            cell.value = stats[str(dt)][key]; cell.font = Font(size=9)
            cell.fill  = fill(bg); cell.alignment = Alignment(horizontal='center'); cell.border = border()

    ws.merge_cells(start_row=OCC_ROW, start_column=1, end_row=OCC_ROW, end_column=2)
    lc = ws.cell(row=OCC_ROW, column=1)
    lc.value = 'ベッド稼働率'; lc.font = Font(bold=True, size=9)
    lc.fill  = fill(SUBHDR_BG); lc.alignment = Alignment(horizontal='center', vertical='center'); lc.border = border()
    for j, dt in enumerate(day_list):
        pct  = round(stats[str(dt)]['total'] / TOTAL_BEDS * 100, 1)
        cell = ws.cell(row=OCC_ROW, column=3+j)
        cell.value = f'{pct}%'; cell.font = Font(bold=True, size=9)
        cell.fill  = occ_fill(pct); cell.alignment = Alignment(horizontal='center'); cell.border = border()

    ws.column_dimensions['A'].width = 10
    ws.column_dimensions['B'].width = 14
    for j in range(n):
        ws.column_dimensions[get_column_letter(3+j)].width = 5

# 総合サマリー
ws_sum = wb.create_sheet('総合サマリー')
ws_sum.merge_cells('A1:I1')
h = ws_sum['A1']
h.value = f'病床稼働 総合サマリー（{target_year}年）'
h.font  = Font(bold=True, size=14, color='FFFFFFFF')
h.fill  = fill(HEADER_BG); h.alignment = Alignment(horizontal='center')
ws_sum.row_dimensions[1].height = 24
ws_sum.cell(row=2, column=1).value = '■ 月別サマリー'
ws_sum.cell(row=2, column=1).font  = Font(bold=True)

function downloadReport() {
  if (!reportBytes) return;
  const yearVal = document.getElementById('yearSelect').value;
  const today = new Date();
  const dateStr = `${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}`;
  const yearStr = yearVal === 'auto' ? '' : `_${yearVal}`;
  const fileName = `病床稼働率レポート${yearStr}_${dateStr}.xlsx`;

  const binary = atob(reportBytes);
  const bytes  = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  const blob = new Blob([bytes], {type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = fileName; a.click();
  URL.revokeObjectURL(url);
}
